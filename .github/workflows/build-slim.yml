name: Build alpine Joplin Server

on:
  workflow_dispatch:
    inputs:
      joplin_ref:
        description: 'Joplin 分支/标签 (如: dev, v3.2.0)'
        required: true
        default: 'dev'
      image_tag:
        description: '镜像标签'
        required: true
        default: 'alpine'

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ====== 【关键修复 #1】强制使用 Node.js 24 ======
    # 背景：2026年6月后 GitHub Actions 默认仍可能使用旧版 Node，需手动指定
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # ============================================

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4
        with:
          path: build-repo

      - name: Checkout Joplin source
        uses: actions/checkout@v4
        with:
          repository: qiuxufeng/joplin
          ref: ${{ github.event.inputs.joplin_ref }}
          path: joplin-source

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./joplin-source
          # ====== 【关键修复 #2】Dockerfile 路径修正 ======
          # 原文错误: ./Dockerfile.server 
          # 原因: 你 checkout 到了 build-repo 目录，且 Dockerfile 在构建仓库根目录
          file: ./build-repo/Dockerfile.server 
          # ============================================
          push: true
          tags: ghcr.io/${{ github.actor }}/joplin-server:${{ github.event.inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
